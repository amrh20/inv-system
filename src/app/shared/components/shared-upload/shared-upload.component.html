<div class="shared-upload">
  @if (label()) {
    <label class="shared-upload__label">{{ label() }}</label>
  }

  <input
    #fileInput
    type="file"
    class="shared-upload__native-input"
    [accept]="accept()"
    (change)="onFilePicked($event)"
  />

  <button type="button" class="shared-upload__dropzone" (click)="fileInput.click()">
    @if (isImageFile() && selectedPreviewUrl()) {
      <div class="shared-upload__image-preview" [class.shared-upload__image-preview--visible]="previewVisible()">
        <img
          [src]="selectedPreviewUrl()!"
          [alt]="'COMMON.PREVIEW' | translate"
          class="shared-upload__thumb"
          width="100"
          height="100"
        />
        <button
          type="button"
          class="shared-upload__remove-btn"
          (click)="removeFile($event)"
          [attr.aria-label]="'COMMON.REMOVE' | translate"
        >
          <lucide-icon [img]="lucideX" [size]="14" [strokeWidth]="2" />
        </button>
      </div>
    } @else if (displayFileName()) {
      <div class="shared-upload__doc-preview">
        <lucide-icon [img]="lucideFileText" [size]="24" [strokeWidth]="2" class="shared-upload__doc-icon" />
        <div class="shared-upload__file-name">{{ displayFileName() }}</div>
        <button
          type="button"
          class="shared-upload__remove-btn shared-upload__remove-btn--doc"
          (click)="removeFile($event)"
          [attr.aria-label]="'COMMON.REMOVE' | translate"
        >
          <lucide-icon [img]="lucideX" [size]="14" [strokeWidth]="2" />
        </button>
      </div>
    } @else {
      <div class="shared-upload__empty">
        <lucide-icon [img]="lucideUploadCloud" [size]="28" [strokeWidth]="2" class="shared-upload__empty-icon" />
        <div class="shared-upload__empty-title">{{ 'ITEM_FORM.CLICK_TO_UPLOAD' | translate }}</div>
        <div class="shared-upload__empty-subtitle">{{ 'ITEM_FORM.UPLOAD_HINT' | translate }}</div>
        <span class="shared-upload__browse-pill">{{ 'COMMON.BROWSE' | translate }}</span>
      </div>
    }
  </button>
</div>
