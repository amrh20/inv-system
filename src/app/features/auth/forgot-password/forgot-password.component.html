<div class="auth-public-page">
  <div class="auth-public-page__header">
    <button
      nz-button
      nzType="text"
      type="button"
      nz-dropdown
      [nzDropdownMenu]="langMenu"
      nzTrigger="click"
      nzPlacement="bottomRight"
      [attr.aria-label]="'LAYOUT.CHANGE_LANGUAGE' | translate"
    >
      <lucide-icon [img]="lucideLanguages" [size]="18" [strokeWidth]="2" />
      <span>{{ language.current() === 'en' ? ('COMMON.ENGLISH' | translate) : ('COMMON.ARABIC' | translate) }}</span>
    </button>
    <nz-dropdown-menu #langMenu="nzDropdownMenu">
      <ul nz-menu>
        <li nz-menu-item [class.ant-menu-item-selected]="language.current() === 'en'" (click)="language.setLanguage('en')">
          <span>English</span>
        </li>
        <li nz-menu-item [class.ant-menu-item-selected]="language.current() === 'ar'" (click)="language.setLanguage('ar')">
          <span>العربية</span>
        </li>
      </ul>
    </nz-dropdown-menu>
  </div>

  <nz-card class="auth-public-page__card" [nzBordered]="true">
    <h1 class="auth-public-page__title">{{ 'AUTH.FORGOT_PASSWORD.TITLE' | translate }}</h1>
    <p class="auth-public-page__subtitle">{{ 'AUTH.FORGOT_PASSWORD.SUBTITLE' | translate }}</p>

    @if (error()) {
      <nz-alert nzType="error" [nzMessage]="error()" nzShowIcon class="auth-public-alert" />
    }

    <form nz-form [formGroup]="form" (ngSubmit)="submit()" nzLayout="vertical">
      <nz-form-item>
        <nz-form-label nzRequired>{{ 'AUTH.FORGOT_PASSWORD.EMAIL' | translate }}</nz-form-label>
        <nz-form-control>
          <div class="input-with-icon">
            <lucide-icon [img]="lucideMail" [size]="18" [strokeWidth]="2" class="input-icon auth-public-page__input-icon" />
            <input
              nz-input
              type="email"
              formControlName="email"
              [placeholder]="'LOGIN.EMAIL_PLACEHOLDER' | translate"
              autocomplete="email"
            />
          </div>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control>
          <button nz-button nzType="primary" nzBlock type="submit" [nzLoading]="loading()" class="auth-public-submit">
            {{ 'AUTH.FORGOT_PASSWORD.SUBMIT' | translate }}
          </button>
        </nz-form-control>
      </nz-form-item>
    </form>

    <div class="auth-public-page__footer">
      <a routerLink="/login" class="auth-public-page__link text-brand-primary">{{ 'AUTH.FORGOT_PASSWORD.BACK_TO_LOGIN' | translate }}</a>
    </div>
  </nz-card>
</div>
